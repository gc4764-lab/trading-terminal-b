name: Build and Deploy

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Test Backend
      run: |
        cd backend
        go test -v ./...
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
    
    - name: Test Flutter
      run: |
        cd frontend
        flutter pub get
        flutter test

  build-windows:
    runs-on: windows-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
    
    - name: Build Windows
      run: |
        cd frontend
        flutter build windows --release
    
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v3
      with:
        name: windows-build
        path: frontend/build/windows/runner/Release/

  build-macos:
    runs-on: macos-latest
    needs: test
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.16.0'
    
    - name: Build macOS
      run: |
        cd frontend
        flutter build macos --release
    
    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v3
      with:
        name: macos-build
        path: frontend/build/macos/Build/Products/Release/

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [build-windows, build-macos]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build Docker image
      run: |
        cd backend
        docker build -t stock-trading-backend:latest .
    
    - name: Push to Docker Hub
      run: |
        echo ${{ secrets.DOCKER_PASSWORD }} | docker login -u ${{ secrets.DOCKER_USERNAME }} --password-stdin
        docker tag stock-trading-backend:latest ${{ secrets.DOCKER_USERNAME }}/stock-trading-backend:latest
        docker push ${{ secrets.DOCKER_USERNAME }}/stock-trading-backend:latest